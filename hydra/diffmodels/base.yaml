load_params_from_path: null
load_ema_params_from_path: null
model_key: null
model_use_ema: null

train:
  batch_size: 4
  epochs: 200
  log_freq: 10
  save_model_every_n_epoch: 10
  use_ema: true
  ema_warm_start_steps: 500
  ema_decay: 0.999
  lr: 1e-4
  cache_dataset: False
  cache_dataset_in_gpu: False
  cache_dataset_load_from_disk: False
  cache_dataset_store_on_disk: False
  cache_dataset_disk_path: null
  cache_dataset_repeats: 1
  use_batch_sampler_same_shape: True
  group_shape_by: 'target'
  shuffle: True
  num_workers: 0
  # Resume across SLURM 2-day boundaries. Pass a path to a resume_latest.pt
  # (or a cluster-keyed dict resolved via path_resolver). null = fresh run.
  resume_from: null
  # Always emit resume_latest.pt alongside model_N.pt at every save tick.
  save_resume_state: True
  # Inline unconditional generation after every EMA save. One sample from
  # pure noise -> evolution.gif + grid.png. Best-effort: failures are
  # logged and do not kill training. Override per-experiment as needed
  # (e.g. ++diffmodels.train.inline_gen.size=320 for SKM-TEA).
  inline_gen:
    enabled: True
    size: 240
    num_steps: 50
    save_every: 5
  log_dataset_stats_before_training:
    enabled: False
    num_dataloader_stat_samples: -1 # has to be negative or multiple of batch size
    num_dataloader_image_samples: 20 # has to be negative or multiple of batch size

val:
  batch_size: 4
  sample_freq: 1
  num_img_in_sample_log: 5
  group_shape_by: 'target'
  shuffle: True
  num_workers: 0
  cache_dataset: False
  cache_dataset_in_gpu: False
  cache_dataset_repeats: 1 
  cache_dataset_load_from_disk: False
  cache_dataset_store_on_disk: False
  cache_dataset_disk_path: null
  use_batch_sampler_same_shape: True