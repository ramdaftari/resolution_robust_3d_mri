# @package _global_
# Base training config for BraTS 2D diffusion prior (full-res single-coil).
# Mirrors hydra/exps/skmtea/base_training.yaml; only the dataset override
# and an empirically-calibrated target_scaling_factor differ.
defaults:
  - /dataset: brats
  - override /problem_trafos/fwd_trafo: null
  - override /problem_trafos/target_trafo: null
  - override /problem_trafos/prior_trafo: crop_mag
  - override /problem_trafos/dataset_trafo: mri2d_train_calc_mvue

problem_trafos:
  prior_trafo:
    swap_channels: True
    scaling_factor: 1.0

  dataset_trafo:
    # BraTS LMDB stores ALREADY-MASKED 4x k-space, so target_type='fullysampled_rec'
    # would yield zero-filled reconstruction instead of clean image.
    # BratsSliceDataset surfaces the precomputed clean target (source image
    # normalized to [0,1], cast to complex64, view_as_real (Y,Z,2)); we consume
    # it directly via target_type=mvue. Works for both single-coil (C=1) and
    # multi-coil (C=8) LMDBs since mvue passes target through without
    # touching sens maps.
    target_type: 'mvue'

    # kspace_vol_norm is now computed as ||target||_F (brats_slice_dataset.py),
    # so scale_target_by_kspacenorm yields a per-volume RMS=1 target, exactly
    # like Stanford/CC359 (ortho-FFT Parseval: ||K_full||_F == ||target||_F).
    # Use the same target_scaling_factor=2.0 as Stanford/CC359
    # (mri2d_train_calc_mvue.yaml default) — probe_brats_norm_v2.py confirms
    # post-kspacenorm std ~0.92-0.93, so x2.0 lands at std~1.85, the same
    # operating-point regime as SKM-TEA's std~1.44.
    target_scaling_factor: 2.0

dataset:
  fold: 'train'
